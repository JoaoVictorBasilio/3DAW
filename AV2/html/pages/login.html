<!-- AV2 file: Tela de login para usuários existentes se autenticarem. -->
<div id="login" class="tela">
    <div class="split-layout">
        <div class="split-form">
            <h2>BEM-VINDO!</h2>
            <p class="subtitle">Bem vindo de volta! Por favor coloque suas informações.</p>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="log_email" placeholder="Coloque seu Email">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="log_senha" placeholder="*********">
            </div>
            
            <button class="btn-vermelho btn-full" onclick="fazerLogin()">Entrar</button>
            
            <p class="auth-footer">
                Não tem uma conta? <a onclick="mudarTela('cadastro')" class="link-vermelho">Crie de graça!</a>
            </p>
        </div>
        <div class="split-image"></div>
    </div>
</div>
