<!-- AV2 file: Tela de perfil para visualizar e atualizar os dados do usuário. -->
<div id="perfil" class="tela">
    <div class="container-central">
        <div class="modal-card modal-sm">
            <h2 class="titulo-azul">MEU PERFIL</h2>
            
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" id="perfil_nome">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="perfil_email">
            </div>
            <div class="form-group">
                <label>Nova Senha:</label>
                <input type="password" id="perfil_senha" placeholder="Deixe em branco para manter">
            </div>
            
            <button class="btn-azul btn-full" onclick="salvarPerfil()">SALVAR</button>
            <hr class="divisor">
            
            <h3 class="titulo-perigo">Zona de Perigo</h3>
            <button class="btn-vermelho btn-full" onclick="apagarConta()">APAGAR MINHA CONTA</button>
        </div>
    </div>
</div>
