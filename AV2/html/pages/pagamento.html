<!-- AV2 file: Tela de pagamento e finalização de reserva. -->
<div id="pagamento" class="tela">
    <div class="container-central">
        <div class="modal-card modal-md">
            <h2>Pagamento e Confirmação</h2>
            <input type="hidden" id="pag_quarto_id">
            
            <div class="form-group flex-row">
                <div class="flex-1">
                    <label>Check-in:</label>
                    <input type="date" id="pag_checkin" onchange="calcularTotal()">
                </div>
                <div class="flex-1">
                    <label>Check-out:</label>
                    <input type="date" id="pag_checkout" onchange="calcularTotal()">
                </div>
            </div>
            
            <div class="form-group">
                <label>CPF:</label>
                <input type="text" id="pag_cpf" placeholder="000.000.000-00">
            </div>
            
            <div class="box-total">
                <p>Total a Pagar:</p>
                <h2 id="pag_valor_total">R$ 0.00</h2>
            </div>
            
            <div class="form-group">
                <label>Método:</label>
                <select id="pag_metodo" onchange="mudarFormaPagamento()">
                    <option value="cartao">Cartão de Crédito</option>
                    <option value="pix">Pix</option>
                </select>
            </div>
            
            <div id="bloco_cartao">
                <div class="form-group">
                    <input type="text" id="pag_cartao" placeholder="Número do Cartão">
                </div>
            </div>
            
            <div id="bloco_pix" class="box-pix" style="display:none;">
                <p>Chave Pix (Celular):</p>
                <h3>(21) 99999-9999</h3>
            </div>
            
            <button class="btn-azul btn-pagar" onclick="finalizarReserva()">CONFIRMAR RESERVA</button>
        </div>
    </div>
</div>
